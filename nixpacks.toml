providers = ["node"]

# Explicit phases so Nixpacks won't try to run during build
[phases.setup]
nixPkgs = ["nodejs", "python3", "gcc", "gnumake", "pkg-config"]

[phases.install]
cmds = [
  "if [ -f backend/package.json ]; then cd backend && npm ci; fi",
  "if [ -f backend/setup_uploads_directories.js ]; then node backend/setup_uploads_directories.js; fi"
]

[phases.build]
cmds = ["echo skipping build phase"]

[start]
cmd = "npm start"
