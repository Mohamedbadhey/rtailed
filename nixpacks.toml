providers = ["node"]

# Explicit phases so Nixpacks won't try to run during build
[phases.setup]
nixPkgs = ["nodejs"]

[phases.install]
cmds = [
  "cd backend && npm ci",
  "cd backend && node scripts/setup_uploads_directories.js || cd backend && node setup_uploads_directories.js || true"
]

[phases.build]
cmds = ["echo skipping build phase"]

[start]
cmd = "cd backend && npm start"
