providers = ["node"]

# Explicit phases so Nixpacks won't try to run during build
[phases.setup]
nixPkgs = ["nodejs"]

[phases.install]
cmds = [
  "if [ -f backend/package.json ]; then cd backend && npm ci; else npm ci; fi",
  "if [ -f backend/setup_uploads_directories.js ]; then node backend/setup_uploads_directories.js; elif [ -f setup_uploads_directories.js ]; then node setup_uploads_directories.js; else echo 'no setup_uploads_directories.js found'; fi"
]

[phases.build]
cmds = ["echo skipping build phase"]

[start]
cmd = "npm start"
